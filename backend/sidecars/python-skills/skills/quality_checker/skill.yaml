name: quality_checker
display_name: Quality Checker
description: Builds a deterministic quality issue report from reviewable character, style, storyboard, mock video, voice, subtitle, and edit envelopes.
stage: QUALITY_REPORT_READY_FOR_RETRY_OR_CONFIRMATION
input_schema: schema.input.json
output_schema: schema.output.json
timeout_seconds: 20
max_retries: 1
cost_policy:
  model_required: false
  estimated_cost: 0
required_provider_capabilities: []
checkpoint_policy:
  required: true
  policy: pause_for_quality_review
